services:
  mysql:
    image: mysql:8.0
    container_name: local-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - local_mysql_data:/var/lib/mysql

  postgres:
    image: postgres:latest
    container_name: local-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - local_postgres_data:/var/lib/postgresql/data

  mariadb:
    image: mariadb:latest
    container_name: local-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    ports:
      - "3307:3306" # Expose port 3307 for MariaDB
    volumes:
      - local_mariadb_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: local-redis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "6739:6739"
    volumes:
      - local_redis:/data


volumes:
  local_mysql_data:
  local_postgres_data:
  local_mariadb_data:
  local_redis: